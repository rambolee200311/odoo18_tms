# ==============================================
# 认知一致性校验规则库
# 用途：AI自我校验、人工卡点校验、流水线校验
# ==============================================

check_rule_set:
  # 1. 架构一致性校验
  architecture_check:
    - 所有业务逻辑必须收敛到服务层/模型层
    - 视图层禁止写业务逻辑
    - 禁止跨层调用、禁止绕过架构分层
    - 新增模型必须符合模块边界

  # 2. 业务规则一致性校验
  business_check:
    - 所有运输单据必须依托pickup.plan/container.service.request发起
    - 所有库存/运输变更必须单据驱动
    - 禁止直改存量、直改状态、直改数量

  # 3. 历史决策一致性校验
  history_decision_check:
    - 不得推翻历史决策笔记中已固化架构取舍
    - 不得重新引入历史已修复Bug机制

  # 4. 刚性约束一致性校验
  forbidden_check:
    - 严格匹配 forbidden_change.yaml 禁止清单
    - 禁止任何绕过、重写、篡改底层逻辑

  # 5. Intent 分类一致性校验（5.x 最终规范）
  intent_check:
    - intent_work_type 必填（Development / Maintenance / Infrastructure / Governance 四选一）
    - intent_change_type 必须匹配支持的 Work Type（见 5.3.2 表格映射）
    - asset_snapshot_profile 必须匹配 work_type（Development→development.yaml，余类推）
    - loop_policy 必填
    - validation_strategy.layers 至少包含 static_check + build_verify + auto_test
    - accept_criteria 至少包含一条可量化验收标准
    - source.type / source.origin_team 必填（需求可追溯）
    - affected_assets 必填（用于 retry_scope 判定）
    - 禁止 Development/Infrastructure 任务跳过 human_accept 终止条件

# 校验不通过直接拦截迭代
fail_strategy: intercept_and_rollback
