# ==============================================================
# 4项运行时 TestCase 详细定义（设计文档，非实现）
# ==============================================================
test_cases:

  test_01_view_mode_no_tree:
    target: "ir.actions.act_window（wd_tlms 模块内的）"
    check: "view_mode 字段值中不含 'tree'"
    coverage: "BUG-012"
    rationale: |
      Odoo 18 将 tree 视图类型重命名为 list。
      若 act_window 的 view_mode 值为 "calendar,tree,form"，
      前端打开菜单时抛"View types not defined tree"错误。

  test_02_menuitem_parent_exists:
    target: "ir.ui.menu（wd_tlms 模块内的）"
    check: "每个菜单项的 parent_id 存在于模块定义的菜单集中"
    coverage: "BUG-011"
    rationale: |
      XML 中 menuitem 的 parent= 指向一个不存在的 XML ID，
      或父菜单在后部定义，模块加载时抛 ValueError。

  test_03_action_res_model_has_view:
    target: "ir.actions.act_window（wd_tlms 模块内的）"
    check: "每个 view_mode 类型，其 res_model 在 ir.ui.view 中至少有一个对应类型视图"
    coverage: "BUG-007/009（扩展覆盖）"
    rationale: |
      若视图引用了模型中不存在的字段，或 act_window 引用了不存在的视图，
      Python 层面可能通过，但运行时打开视图会报错。

  test_04_action_view_refs_exist:
    target: "act_window view_ids 行"
    check: "每个 view_ids 行的 view_id 对应的 ir.ui.view 记录存在"
    coverage: "通用引用完整性"
    rationale: |
      view_ids 中引用了已删除或不存在的视图记录，
      打开 action 时前端可能加载空白页面。
