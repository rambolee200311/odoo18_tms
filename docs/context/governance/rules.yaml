# 运行治理 · 静态红线规则
# 第七章核心：智能体永久禁止行为、架构红线、业务红线、安全红线
governance_version: 1.0.0
enable_static_rule: true

# 架构红线（绝对禁止）
architecture_redline:
  - 禁止视图层处理核心业务逻辑
  - 禁止跨层直接读写模型数据
  - 禁止绕过服务层校验直接生成业务单据
  - 禁止推翻历史架构决策与分层规范

# 业务红线（单据驱动铁律）
business_redline:
  - 所有运输流程必须依托 pickup.plan 单据发起
  - 所有排期变更必须留存日志记录
  - 禁止无单据、无日志修改运输状态
  - 禁止时间段重叠排期
  - 所有Bug整改必须严格依照bug_workflow.yaml七步闭环执行
  - 禁止无登记、无校验、无记录的临时热修复代码提交  
  - 禁止遗忘历史Bug规避方案
  - 禁止违反认知一致性规则
  - 禁止私自新增未授权模型/字段/接口

# 安全红线
security_redline:
  - 禁止硬编码密钥、端口、账号
  - 禁止开放超级权限匿名接口
  - 禁止绕过权限校验执行业务操作
  
# 知识管理红线
knowledge_redline:
  # 开发前置 —— 任何 Sprint 类型
  - 每次 Sprint 启动时，AI 必须首先执行 context_loader.py，加载当前全部 LEVEL2/3 约束警告，再开始编写代码

  # 提交前置 —— 按 Sprint 类型区分
  # 通用（必更新）
  - decision_note.md（记录本次 Sprint 的决策/发现/关键数据）
  - context_version.yaml（升级版本号）

  # 按类型
  - test_exec_records.yaml: 凡是跑了测试的 Sprint 都更新（测试/开发/Bug修复）
  - bug_record.md: 凡是发现 Bug 的 Sprint 都更新
  - test_lessons.yaml: 仅当本次 Sprint 有新教训可提取时更新；无新教训则跳过
  - 禁止仅更新 decision_note.md 而不同步更新其他应更新的资产
