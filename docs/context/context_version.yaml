      - docs/context/history/decision_note.md: 新建
      - docs/context/constraints/forbidden_change.yaml: 新建

# 上下文有效性强制规则（AI不可绕过）
valid_rule:
  - 每次迭代必须同步更新本版本文件
  - 禁止人工擅自删除/修改 forbidden_change.yaml 刚性约束
  - 意图契约变更必须升级小版本号
  - 架构/业务规则变更必须升级次版本号

# 绑定资产目录
bind_asset_folder:
  - architecture
  - business
  - history
  - constraints
  - intent
