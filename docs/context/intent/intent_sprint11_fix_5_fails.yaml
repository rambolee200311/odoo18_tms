# ==============================================================
# 5 条失败修复详细设计
# ==============================================================
bug_fixes:

  fix_01:
    test: "TestTransportOrder.test_01_state_flow_normal"
    file: "models/transport_order.py"
    symptom: "create() 时 partner_id 丢失（null value violates not-null constraint）"
    root_cause: "partner_id = fields.Many2one(required=True) 但在 create 传递 vals 后仍被清除"
    fix: "排查 create 方法及 _sync_upstream_status 回调，确保 partner_id 正确写入"
    verify: "test_01 通过 → source_type 不依赖 partner_id 问题"

  fix_02:
    test: "TestTransportOrder.test_06_from_pickup_plan"
    file: "models/pickup_plan_fix.py"
    symptom: "action_create_transport_order() 创建 order 时 partner_id/carrier_id 缺失"
    root_cause: "order_vals 依赖 plan.carrier_id.id，但 create 时 carrier_id 传递有误"
    fix: "确保 order_vals 包含 carrier_id=self.carrier_id.id, partner_id=(carrier or env.user)"
    verify: "test_06 通过 → plan→order 创建正常"

  fix_03:
    test: "TestTransportOrder.test_07_from_quote"
    file: "models/transport_quote.py"
    symptom: "_auto_create_order() 创建 order 缺少 carrier_id（required=True）"
    root_cause: "order create vals 中没有包含 carrier_id"
    fix: "新增 carrier_id = self.partner_id.id（quote 的 partner_id 即为承运商）"
    verify: "test_07 通过 → quote→order 自动创建正常"

  fix_04:
    test: "TestTransportRequest.test_09_source_type_iff"
    file: "models/transport_request.py (action_start_inquiry)"
    symptom: "action_start_inquiry() 创建 inquiry 时缺少 partner_id（required=True）"
    root_cause: "inquiry create vals 中没有 partner_id 字段"
    fix: "新增 partner_id = self.carrier_id.id（request 的 carrier 作为承运商）"
    verify: "test_09 通过 → inquiry 创建正常"

  fix_05:
    test: "TestPickupPlan.test_07_lifecycle_by_downstream / test_08"
    file: "models/pickup_plan.py"
    symptom: "create() 自动创建 transport.request 时 warehouse_id 缺失"
    root_cause: "auto-created request 的 vals 未继承 plan 的 warehouse_id"
    fix: "在 create 方法中补充 warehouse_id = vals.get('warehouse_id', False)"
    verify: "test_07/test_08 通过 → plan 创建正常"
