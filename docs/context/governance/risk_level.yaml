# 五级风险分级治理
# 用于：人工卡点分级、自动熔断、权限放行策略
risk_version: 1.0.0

risk_levels:
  LEVEL1:
    name: 低风险UI调整
    desc: 视图文字、布局、按钮显隐、非业务字段调整
    auto_pass: true
    human_review: false

  LEVEL2:
    name: 普通业务迭代
    desc: 新增非核心字段、新增辅助视图、扩展校验规则
    auto_pass: true
    human_review: 简单复核

  LEVEL3:
    name: 核心业务变更
    desc: 单据流程、排期逻辑、约束规则新增/修改
    auto_pass: false
    human_review: 必须审核

  LEVEL4:
    name: 架构级变更（高危）
    desc: 模型结构、分层逻辑、依赖关系改动
    auto_pass: false
    human_review: 技术负责人审批

  LEVEL5:
    name: 底层致命变更（禁止）
    desc: 推翻历史决策、修改核心底层逻辑、绕过铁律
    auto_pass: false
    forbid_execute: true

# 模块风险映射
module_risk_map:
  pickup.plan: LEVEL3
  schedule.plan.schedule: LEVEL3
  架构分层: LEVEL4
  底层单据流转: LEVEL5
