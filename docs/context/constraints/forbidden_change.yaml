# 禁止修改清单（forbidden_change.yaml）
# 发布: 2026-07-21
# 适配: Sprint1
# AI Agent 必须严格遵守，触碰即违规

version: 1.0.0

# ========== 架构层约束 ==========
architecture:
  - target: "Odoo 底层 ORM"
    rule: "禁止修改 odoo/orm 任何代码"
    risk: "破坏所有模型基础行为"

  - target: "原生 stock 模块"
    rule: "禁止修改 addons/stock 任何代码"
    risk: "库存模块是全局基础设施"

  - target: "原生 account 模块"
    rule: "禁止修改 addons/account 任何代码"
    risk: "财务模块是全局基础设施"

  - target: "wd_iffm 模块"
    rule: "禁止反向修改 wd_iffm 任何数据字段"
    risk: "TMS 仅做只读引用，绝不反向写 IFFM"

  - target: "wd_bonded_wms 模块"
    rule: "禁止在 TMS 内操作库存/账册数据"
    risk: "库存归属 WMS 模块管，TMS 只做运输轨迹留痕"

  - target: "视图层直接读写数据库"
    rule: "禁止在 XML 视图/JS/Controller 中执行 SQL 或 bypass ORM"
    risk: "违反 Odoo 三层架构"

# ========== 数据层约束 ==========
data:
  - target: "费用字段"
    rule: "禁止在 pickup.plan 新增任何金额/费用/财务字段"
    risk: "财务相关字段由 Sprint3 询价报价订单页处理"

  - target: "结算账单字段"
    rule: "禁止在 pickup.plan 新增结算账单关联"
    risk: "结算由 bill/settlement 模型独立处理"

  - target: "数据库直连"
    rule: "禁止使用 self.env.cr.execute 绕过 ORM 写数据"
    risk: "违反 Odoo 模型层规范"

# ========== 功能层约束 ==========
feature:
  - target: "排期日历拖拽功能"
    rule: "Sprint1 不允许开发"
    risk: "属于 Sprint2 排期日历功能范围"

  - target: "询价/报价/运输订单流程"
    rule: "Sprint1 不允许开发"
    risk: "属于 Sprint3 流程链路范围"

  - target: "金融结算功能"
    rule: "Sprint1 不允许开发"
    risk: "属于 Sprint3+ 结算模块范围"

# ========== 安全层约束 ==========
security:
  - target: "group 配置"
    rule: "禁止删除或停用已有 security group"
    risk: "影响多用户访问权限"

  - target: "portal 权限"
    rule: "Sprint1 暂不涉及 portal_access 修改"
    risk: "portal 属于后续迭代"

# ========== 审计规则 ==========
audit:
  check_before_commit:
    - "确认无 Scope forbid 中任何违规项"
    - "确认无 Odoo 底层/原生模块代码修改"
    - "确认无直连 SQL 规避 ORM"
    - "确认所有新增字段在 intent scope allow 范围内"
    - "确认视图字段显隐规则正确无误"


# ========== 新增例外（Sprint5 确认，Sprint6 执行） ==========
soft_reference_allow:
  - target: "world.depot.charge.item / world.depot.charge.unit"
    rule: "允许 TMS 通过 Many2one 引用 world.depot.charge.item 作为全局费用主数据"
    rationale: >
      charge.item/charge.unit 是全局基础主数据（等同于 res.partner、product.product），不是 worlddepot 模块私有数据。
      TMS 引用它属于正常基础数据依赖，不视为侵入 worlddepot / wd_iffm。
    precondition: "worlddepot 必须加入 __manifest__.py depends 列表"
    effect: "transport.fee.line.fee_type_id 将指向 world.depot.charge.item，而非 TMS 自建模型"

  - target: "transport.fee.type（Sprint5 新建）"
    rule: "如 Sprint6 改用 world.depot.charge.item 作为费用主数据，允许移除 transport.fee.type 模型"
    rationale: "fee.type 是 Sprint5 预建的 TMS 内部副本，若改用全局 charge.item 则副本不再需要"


# ========== 新增技术红线（Sprint8 确认） ==========
controller_bypass:
  - target: "不必要的 Controller JSON 路由"
    rule: "禁止为了给前端 JS 提供数据而新增 Controller HTTP/JSON 路由"
    rationale: >
      Odoo OWL 前端通过 useService("orm") 可直接调用 search_read、read、call 等标准 ORM API，
      无需 Controller 层中转。新增 Controller 路由增加了维护面、绕过了 ORM 的权限和安全校验。
      模型层方法应被设计为可供 orm.call() 调用，而非通过 Controller 暴露。
    exception: "QWeb 页面渲染路由（type='http' 返回模板）、文件下载等 ORM 无法覆盖的场景"
    effect: "前端交互统一走 orm.searchRead / orm.call / orm.create，不新增 JSON Controller"

  - target: "现有 pickup_schedule.py Controller API"
    rule: "存量 API 保留不动，Sprint8 新增功能不扩展 Controller，改为模型方法 + JS 直接 orm.call"
    rationale: "Sprint2 遗留的 Controller 模式已存在。新代码应遵循上述红线，不继续沿用旧模式。"