# ==============================================
# 认知沉淀与上下文更新规则
# 基于实践提炼：什么该更新上下文、什么只进bug_record
# ==============================================

cognition_refresh_version: 1.1.0

# ==============================================
# 必须更新上下文的场景
# ==============================================
must_update:
  - trigger: "新架构决策"
    example: "transport.order 必须双来源"
    update: "architecture/ + history/decision_note.md"

  - trigger: "新业务规则"
    example: "费用必须来源隔离 plan_driven/commercial"
    update: "business/"

  - trigger: "新永久约束"
    example: "禁止 controller 绕过 ORM"
    update: "constraints/"

  - trigger: "新工程能力"
    example: "新增 Odoo18 XML 检查"
    update: "governance/ + cognition_asset_map.md"

  - trigger: "版本基线变更"
    example: "Odoo 18 → 19"
    update: "architecture/odoo_version.md + context_version.yaml"

# ==============================================
# 不需要更新上下文的场景
# ==============================================
no_update:
  - trigger: "语法错误（前导空格、拼写）"
    action: "只进 bug_record.md + verify.py"
    reason: "工具缺陷，非知识缺失"

  - trigger: "模块名遗留引用"
    action: "只进 bug_record.md + verify.py"
    reason: "历史债务，非新知识"

  - trigger: "第三方兼容问题"
    action: "只进 bug_record.md + verify.py"
    reason: "环境问题，非架构设计"

  - trigger: "测试未覆盖"
    action: "只进 bug_record.md + verify.py"
    reason: "验证缺失，非规则遗漏"

# ==============================================
# 每次迭代必须更新的资产
# ==============================================
sprint_mandatory:
  - history/sprint_log.md        # 迭代日志
  - history/decision_note.md     # 决策记录（如有）
  - context_version.yaml         # 版本升级
  - bug_record.md                # Bug记录（如有）

# ==============================================
# 认知沉淀四要素
# ==============================================
precipitation_elements:
  1: "本次迭代新增业务认知"
  2: "本次迭代架构认知加固"
  3: "本次迭代规避的风险认知"
  4: "本次迭代新增工程决策认知"
