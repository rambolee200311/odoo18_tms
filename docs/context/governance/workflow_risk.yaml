# 流水线动态风控与自动熔断
workflow_risk_version: 1.0.0

# 可触发熔断的违规场景
fuse_trigger:
  - AI代码超出意图Scope范围
  - 代码违反认知一致性
  - 触碰静态红线规则
  - 高危变更无人工审批
  - 出现历史已规避Bug类型
  - 无单据业务逻辑

# 熔断策略
fuse_strategy:
  default: 拒绝本次迭代、退回重开发
  high_risk: 冻结模块迭代、强制复盘
  critical: 暂停所有AI开发、锁定版本基线

# 流水线校验步骤
pipeline_check_step:
  1: 意图契约校验
  2: 认知资产一致性校验
  3: 静态红线规则扫描
  4: 风险等级判定
  5: 人工卡点校验
  6: 审计日志留存
