# ==============================================================
# 【Sprint13 正式意图契约】
# 功能：Context Loader v2 → Context Runtime v3
#        从"目录存在性扫描器"升级为"AI Agent 上下文运行时入口"
# 前置基线：评审发现 context_loader.py 未真正加载/校验/注入认知
# 基线版本：context_version:1.0.15 → 1.0.16
# ==============================================================

contract_meta:
  contract_id: INT-TMS-SPRINT13-001
  create_time: "2026-07-23"
  project_name: "Odoo18 TMS 跨境3PL运输管理系统"
  sprint_version: "Sprint13 Context Runtime 升级"
  contract_type: "工程基础设施重构"

goal: >
  将 context_loader.py 从"文件存在性检查器"升级为完整的 Context Runtime：
  1. 真正读取资产内容而非仅检查存在
  2. 基线一致性校验（intent baseline vs context_version，不一致阻止开发）
  3. 风险等级阻断（LEVEL3 发现时必须确认）
  4. 结构化摘要输出（非仅文件名计数）
  5. 多值退出码（ready / asset_missing / mismatch / risk_blocked）
  6. --json 输出模式（AI Agent 可消费）
  7. 消除评审指出的所有代码级问题（encoding、YAML 解析、exit code 等）

scope:
  allow:
    # ---- Context Runtime 升级 ----
    - "execution/scripts/context_loader.py 完整重写为 Context Runtime v3"
    - "读取资产实际内容（business/stock_rule、architecture 等关键资产）"
    - "基线校验：context_version vs intent baseline 不一致时输出 FAIL 并阻断"
    - "风险阻断：test_lessons LEVEL3 规则未确认时禁止进入开发"
    - "多值退出码体系（0=ready / 1=missing / 2=mismatch / 3=risk_blocked）"
    - "--json 输出模式"
    - "YAML 解析改为 import yaml（消除手工 split）"
    - "所有 open() 补全 encoding='utf-8'"

    # ---- 上下文资产更新 ----
    - "docs/context/context_version.yaml（1.0.15→1.0.16）"
    - "docs/context/history/decision_note.md（追加 Sprint13 记录）"
    - "docs/context/validation/test_exec_records.yaml（追加 Sprint13）"

  forbid:
    - 禁止修改任何业务模型、视图、菜单
    - 禁止修改 tests/ 目录下任何测试文件
    - 禁止修改 __manifest__.py
    - 禁止修改 governance/ 下除 test_lessons.yaml 外的规则资产
    - 禁止新增/修改结算、费率、账单相关任何代码

workflow:
  step_1: "加载 v1.0.15 基线 + 读取 context_loader.py 评审意见"
  step_2: "修复代码级问题（encoding / YAML解析 / exit code）"
  step_3: "实现基线一致性校验（intent binding）"
  step_4: "实现风险等级阻断（LEVEL3 确认机制）"
  step_5: "实现资产内容读取 + 结构化摘要"
  step_6: "实现 --json 输出模式"
  step_7: "verify.py + odoo_check.py + context_loader 自测"
  step_8: "context_version 1.0.16 + decision_note + 归档"

input:
  context_asset: [
    "docs/context/architecture",
    "docs/context/business",
    "docs/context/history",
    "docs/context/constraints",
    "docs/context/cognition",
    "docs/context/governance"
  ]
  current_code_base: "execution/scripts/context_loader.py"

output:
  model_change_list: []
  view_change_list: []
  code_file_list:
    - "execution/scripts/context_loader.py（完整重写 v3）"
    - "docs/context/context_version.yaml（1.0.15→1.0.16）"
  document_update_list:
    - "docs/context/history/decision_note.md"
    - "docs/context/validation/test_exec_records.yaml"

exit_criteria:
  rule_1: "context_loader.py 使用 import yaml 解析，无手工 split 残留"
  rule_2: "所有 open() 声明 encoding='utf-8'"
  rule_3: "基线校验：intent 与 context_version 不一致时输出 FAIL 并 exit(3)"
  rule_4: "风险阻断：LEVEL3 规则未确认时 exit(2)"
  rule_5: "--json 输出有效 JSON 结构"
  rule_6: "资产读取至少输出 business/architecture/governance 的结构化摘要"
  rule_7: "context_version 1.0.16 归档"

human_gate:
  gate1: "评审 context_loader.py 升级方案确认"
  gate2: "自动放行（纯工程基础设施，无业务风险）"

bind_context_version: "1.0.15"
bind_forbidden_rule: "docs/context/constraints/forbidden_change.yaml"

# ==============================================================
# Context Runtime v3 详细设计
# ==============================================================
design:

  baseline_check:
    input: "context_version.yaml + 当前 intent yaml 的 bind_context_version"
    logic: |
      读取 intent yaml 中的 bind_context_version 字段。
      若 intent.bind_context_version != context_version.yaml 的 version，
      则输出 "BASELINE MISMATCH" 并 exit(3)。
    rationale: "防止 AI 在旧版本上下文中开发，导致架构/业务规则不一致"

  risk_block:
    input: "test_lessons.yaml rules（severity = LEVEL3）"
    logic: |
      读取全部 LEVEL3 规则，输出警告并等待 stdin 确认。
      若未确认（无输入），则 exit(2)。
    note: "当前对话环境无法处理 stdin，LEVEL3 规则仅输出警告并标记风险"

  asset_loading:
    targets:
      - "business/stock_rule.md → 提取业务铁律条数"
      - "architecture/module_map.md → 提取模块数量"
      - "architecture/dependency.yaml → 提取模型数"
      - "governance/rules.yaml → 提取红线条数"
      - "governance/test_lessons.yaml → 提取规则数（已有）"
      - "history/bug_record.md → 提取 Bug 数 / 未关数量"
      - "constraints/forbidden_change.yaml → 提取禁止项数量"
    output: "结构化摘要（human 文本 或 --json 的 dict）"

  json_output:
    structure: |
      {
        "version": "1.0.15",
        "intent": "sprint*_*.yaml: description",
        "baseline_check": "pass" | "fail",
        "assets": {
          "architecture": {"status": "pass", "count": 3, "summary": "..."},
          "business": {"status": "pass", "count": 2, "summary": "..."},
          ...
        },
        "risks": [{"id": "TL-004", "severity": "LEVEL3", "problem": "..."}],
        "ready": true | false
      }
