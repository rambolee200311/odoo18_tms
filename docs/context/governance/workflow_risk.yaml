# ==============================================
# 流水线动态风控与自动熔断
# ==============================================

workflow_risk_version: 2.0.0

# ==============================================
# 可触发熔断的违规场景
# ==============================================
fuse_trigger:
  - AI代码超出意图Scope范围
  - 代码违反认知一致性
  - 触碰静态红线规则
  - 高危变更无人工审批
  - 出现历史已规避Bug类型
  - 无单据业务逻辑
  - 代码语法校验失败（check_1 Python / check_2 XML）
  - 文件首行存在前导空格（check_3）
  - 模块名引用旧名称（check_4）
  - Odoo 18 版本兼容性检查失败（check_5）

# ==============================================
# 熔断策略
# ==============================================
fuse_strategy:
  default: 拒绝本次迭代、退回重开发
  high_risk: 冻结模块迭代、强制复盘
  critical: 暂停所有AI开发、锁定版本基线

# ==============================================
# 流水线校验步骤（6步）
# ==============================================
pipeline_check_step:
  1: 意图契约校验
  2: 认知资产一致性校验
  3: 静态红线规则扫描
  4: 产出语法门禁（pipeline_check.yaml check_1 ~ check_5）
  5: 风险等级判定
  6: 人工卡点校验
  7: 审计日志留存

# ==============================================
# 后门：紧急跳过规则
# ==============================================
emergency_bypass:
  - 允许跳过 check_4（模块名检查），如果明确知道旧名引用为跨模块兼容
  - 允许跳过 check_3（前导空格），如果文件由外部工具生成
  - 跳过必须经 LEVEL3 审核，并在 bug_record.md 中记录跳过理由
