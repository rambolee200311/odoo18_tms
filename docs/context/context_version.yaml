version_log:
  1.0.0:
    update_content: 初始化四层上下文资产 + 意图契约体系完整落地
    update_type: 全量新建
    effect_scope: 所有AI迭代、代码生成、约束校验、实验基线
  1.0.1:
    update_content: Sprint1 完成 pickup.plan 模型优化 + 视图重写 + 新增约束校验 + 创建context约束资产
    update_type: 迭代完成更新
    effect_scope: pickup_plan视图、约束逻辑、context历史资产
    change_detail:
      - models/pickup_plan.py: 新增3个 @api.constrains 约束校验（partner/warehouse/source_warehouse必填）
      - views/pickup_plan_views.xml: 完整重写，destination_type可见、表头按钮+字段按场景动态显隐
