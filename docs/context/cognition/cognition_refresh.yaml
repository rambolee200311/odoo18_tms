# ==============================================
# 认知沉淀与上下文更新规则
# 基于实践提炼：什么该更新上下文、什么只进bug_record
# ==============================================

cognition_refresh_version: 1.1.0

# ==============================================
# 必须更新上下文的场景
# ==============================================
must_update:
  - trigger: "新架构决策"
    example: "transport.order 必须双来源"
    update: "architecture/ + history/decision_note.md"

  - trigger: "新业务规则"
    example: "费用必须来源隔离 plan_driven/commercial"
    update: "business/"

  - trigger: "新永久约束"
    example: "禁止 controller 绕过 ORM"
    update: "constraints/"

  - trigger: "新工程能力"
    example: "新增 Odoo18 XML 检查"
    update: "governance/ + cognition_asset_map.md"

  - trigger: "版本基线变更"
    example: "Odoo 18 → 19"
    update: "architecture/odoo_version.md + context_version.yaml"

# ==============================================
# 不需要更新上下文的场景
# ==============================================
no_update:
  - trigger: "语法错误（前导空格、拼写）"
    action: "只进 bug_record.md + verify.py"
    reason: "工具缺陷，非知识缺失"

  - trigger: "模块名遗留引用"
    action: "只进 bug_record.md + verify.py"
    reason: "历史债务，非新知识"

  - trigger: "第三方兼容问题"
    action: "只进 bug_record.md + verify.py"
    reason: "环境问题，非架构设计"

  - trigger: "测试未覆盖"
    action: "只进 bug_record.md + verify.py"
    reason: "验证缺失，非规则遗漏"

# ==============================================
# 每次迭代必须更新的资产
# ==============================================
sprint_mandatory:
  - history/sprint_log.md        # 迭代日志
  - history/decision_note.md     # 决策记录（如有）
  - context_version.yaml         # 版本升级
  - bug_record.md                # Bug记录（如有）

# ==============================================
# 认知沉淀四要素
# ==============================================
precipitation_elements:
  1: "本次迭代新增业务认知"
  2: "本次迭代架构认知加固"
  3: "本次迭代规避的风险认知"
 4: "本次迭代新增工程决策认知"

# ==============================================
# 按 Intent 类型的资产沉淀规则（5.x 最终规范）
# 整体流程：
#   ACCEPTED（任务验收）
#       → Asset Proposal（自动生成提案 + 完整执行记录）
#       → Human Asset Review（人工复核）
#       → Merge Asset（更新基线）/ 驳回修正
# ==============================================
intent_based_precipitation:

  development:
    work_type: "Development"
    desc: "业务功能开发/需求变更/Bug修复"
    precipitate:
      - "新增/修改的代码、打印坐标、模板归档至对应 Domain 资产目录"
      - "自动生成元数据摘要存入快照库，同类 Intent 加载 Profile 时可复用"
      - "缺陷根因/规避规则写入风险教训资产；对应 Profile 默认加载同模块历史故障快照"

  maintenance:
    work_type: "Maintenance"
    desc: "数据修正/配置调整/性能优化"
    precipitate:
      - "配置变更/迁移规则归档至对应 Domain 目录"
      - "性能测试数据存入审计资产"
      - "摘要入快照库供后续同类任务复用"

  infrastructure:
    work_type: "Infrastructure"
    desc: "底层框架、工具、loader、打印服务改造"
    precipitate:
      - "工具/脚本/配置文件归档至基建资产目录"
      - "配置模板摘要入快照库"

  governance:
    work_type: "Governance"
    desc: "合规校验、风险巡检（只读不改）"
    precipitate:
      - "新增合规校验项/核查标准存入合规资产"
      - "后续 Governance Profile 自动加载新规则"
      - "审计报告归档，无代码变更产出"

# ==============================================
# 沉淀轻量化原则
# ==============================================
precipitation_lightweight:
  - "仅归档摘要、规则、配置元数据、差异补丁"
  - "完整原始文件不重复冗余存储"
  - "每次合并资产自动更新 Domain 版本号"
  - "context_loader 可识别基线变更、区分新旧规则"
  - "执行记录仅存 decision/validation/defect 信息 + 资产差异补丁"
  - "完整代码由 Git 源码管理，执行记录不重复存储"

# ==============================================
# Intent 执行记录目录约束
# ==============================================
execution_record:
  base_dir: "docs/context/intent_records/"
  structure:
    - "intent_xxx/intent.yaml            原始意图完整配置"
    - "intent_xxx/decision.md            技术方案、选型、边界约束说明"
    - "intent_xxx/validation.yaml        每轮分层校验结果、测试数据"
    - "intent_xxx/defect.yaml            迭代过程缺陷、根因、修复方案"
    - "intent_xxx/asset_diff.patch       资产变更差异补丁"
    - "intent_xxx/summary.md             任务整体交付总结"
