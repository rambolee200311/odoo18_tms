# ==============================================================
# 【Sprint18 正式意图契约】
# 功能：MRN/T1 保税合规 + ADR 危险品合规 + 归档附件规范
# 前置基线：Sprint17 场景配置化 → Sprint18 P0 合规模块收尾
# 基线版本：context_version: 1.0.26 → 1.0.27
# ==============================================================

intent_id: INT-TMS-SPRINT18-001
intent_work_type: Development
intent_change_type: New Feature
title: MRN/T1 保税合规 + ADR 危险品合规 + 归档附件规范
target_scope: 完成运输跟踪 P0 剩余合规模块，包括 MRN 海关申报、T1 转运单据、ADR 危险品全字段、归档附件分类

accept_criteria:
  - "transport_order 新增 mrn_code / t1_ref / dg_file_ref / adr_quantity / adr_weight 5 字段可用"
  - "product.product 新增 ADR 属性字段可用（un_number/class/packing_group/dangerous_good）"
  - "产品表单显示 ADR 标签页（仅 manager 组可见）"
  - "新增字段不影响已有测试用例"
  - "verify.py + odoo_check.py 双检通过"

source:
  type: customer_demand
  origin_team: 调度/海关合规

asset_snapshot_profile: development
asset_snapshot_mode: human
bind_context_version: "1.0.27"

loop_policy:
  max_iteration: 5
  retry_scope:
    mode: affected_asset_only
  escalation:
    after_failed_iteration: 3
    require_human: true
  stop_condition:
    - all_validation_pass
    - human_accept
    - risk_block

affected_assets:
  business:
    - transport_order (mrn_code/t1_ref/dg_file_ref/adr_qty/adr_weight)
    - product_product (ADR 属性扩展)
  architecture:
    - transport_order
    - product_product
  governance:
    - forbidden_change

validation_strategy:
  layers:
    - static_check
    - build_verify
    - auto_test
    - runtime_validate
    - business_review
  required_pass: all

deliverables:
  - transport_order 5 个简单字段
  - product_adr.py 产品 ADR 属性扩展
  - product_adr_views.xml 产品 ADR 标签页视图
  - 完整 Intent 执行记录文件夹

limit_constraints: |
  MRN/T1/ADR 不建独立模型，仅 record 单据号和文件编号
  ADR 属性扩展产品档案，不创建独立 ADR 模型
  松耦合设计：保税另有独立模块管理
  产品 ADR 字段仅 manager 组可见

risk_precheck:
  - "MRN/T1 字段对现有 transport_order 测试用例的影响"
  - "ADR 字段必填校验对现有 transport_event 测试的影响"
  - "CMR 打印模板的向下兼容性"

# ==============================================================
# Goal
# ==============================================================

goal: >
  运输跟踪 P0 合规模块松耦合实现：

  1. MRN/T1 单据号记录（松耦合）
     - transport_order 新增 mrn_code / t1_ref 字段
     - 仅记录单据号和文件编号，另有保税模块管理完整 MRN/T1
     - 不建独立模型，不绑定事件
  
  2. ADR 产品属性扩展（松耦合）
     - product.product 扩展 ADR 属性（un_number / class / packing_group）
     - transport_order 记录 dg_file_ref / adr_quantity / adr_weight
     - 已有的 has_dangerous_goods / adr_un_number / adr_class 等字段保持不动
  
  3. 归档附件分类
     - 在 transport_order 表单新增 Attachments 分类视图
     - 分类标签：CMR / POD / MRN / T1 / ADR / General
     - 不修改附件存储逻辑，仅做展示归类

scope:
  allow:
    - "addons/wd_tlms/models/product_adr.py（新增：product.product ADR 属性扩展）"
    - "addons/wd_tlms/models/transport_order.py（增量：mrn_code / t1_ref / dg_file_ref 等 5 字段）"
    - "addons/wd_tlms/views/product_adr_views.xml（新增：产品 ADR 标签页）"
    - "addons/wd_tlms/views/transport_order_views.xml（更新：新增字段布局）"
    - "addons/wd_tlms/security/ir.model.access.csv（无新增——product.product 已有权限）"
    - "addons/wd_tlms/__manifest__.py（增量注册）"
    - "docs/context/architecture/module_map.md"
    - "docs/context/history/decision_note.md"
    - "docs/context/context_version.yaml（1.0.26→1.0.27）"
    - "docs/context/validation/test_exec_records.yaml"

  forbid:
    - 禁止修改非 transport_order 5 字段 + product_adr 范围的文件
    - 禁止修改 transport_event / exception / extra_charge 等跟踪模块
    - 禁止修改 transport_scene / event.type 等已配置化档案
    - 禁止修改 execution/scripts/ 和 governance/ 下任何文件
    - 禁止修改 profiles / context_loader / intent 体系

limit_constraints: |
  MRN/T1 仅跨境保税场景展示（scene_id.code 含 terminal/customer/bonded 判定）
  ADR 字段必填校验在新订单上强制，已有存量订单按需补填
  T1 超期异常复用 transport_exception 模型，不新建异常逻辑
  归档附件分类仅做标签分组展示，不改附件存储结构

risk_precheck:
  - "transport_order 新增 5 个简单字段对现有测试用例的影响"
