contract_meta:
  contract_id: INT-TMS-SPRINT9-001
  create_time: "2026-07-23"
  project_name: "Odoo18 TMS 跨境3PL运输管理系统"
  sprint_version: "Sprint9 运行时集成测试底座"
  contract_type: "工程能力升级"

goal: >
  为 wd_tlms 模块搭建运行时集成测试层，覆盖静态门禁（verify.py 8项）无法捕获的
  运行时集成问题。新增 tests/test_runtime_validation.py，实现 4 项 Odoo TestCase：
  1. view_mode 中 "tree" 的检测（Odoo 18 兼容）
  2. menuitem parent 存在性校验
  3. act_window res_model 对应视图存在性
  4. act_window view_ids 引用视图存在性
  同步更新治理资产（pipeline_check.yaml + bug_fix_workflow.yaml），
  将运行时测试纳入 Bug 修复标准工作流。

scope:
  allow:
    # ---- 测试文件 ----
    - "创建 addons/wd_tlms/tests/__init__.py"
    - "创建 addons/wd_tlms/tests/test_runtime_validation.py（4项 TestCase）"

    # ---- 治理资产升级 ----
