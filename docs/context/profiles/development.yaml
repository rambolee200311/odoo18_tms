# ==============================================
# Context Profile: Development
# 适用 Work Type: Development
# 子变更类型: New Feature / Change Request / Functional Bug Fix / Legacy Migration
# 加载策略: 业务域资产 + 架构 + 约束 + 历史决策
# ==============================================
name: development

include:
  - architecture
  - business
  - constraints
  - history
  - governance/compliance

exclude:
  - governance/human_loop
  - governance/audit_spec
  - validation

load_strategy:
  mode: selective
  summary:
    enabled: true
  full_read:
    allowed:
      - architecture
      - business
      - constraints
  forbidden:
    - validation
