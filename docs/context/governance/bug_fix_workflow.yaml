# ==============================================
# Bug 修复标准工作流（v2 — 追加预防复发）
# 归属：运行治理 —— 异常修复闭环
# 功能：补全双控体系的 Bug 发现→登记→修复→验证→预防→关闭 全链路
# 更新：v2 基于 BUG-001~006 经验，追加 Step 8 预防复发
# ==============================================

bug_workflow_version: 2.0.0

# ==============================================
# Bug 严重等级定义（与 risk_level 对齐）
# ==============================================
severity_level:
  LEVEL1:
    name: 语法/格式错误
    desc: 文件写入格式错误、缩进、拼写，无业务逻辑影响
    auto_fix: true
    example: BUG-001/002/006（前导空格、缩进）

  LEVEL2:
    name: 业务逻辑 Bug（不影响数据完整性）
    desc: 视图显隐错误、按钮行为偏差、关联跳转失效
    auto_fix: false
    human_review: 简单复核

  LEVEL3:
    name: 业务逻辑 Bug（影响数据完整性）
    desc: 约束校验失效、状态机错乱、费用计算错误、单据生成错误
    auto_fix: false
    human_review: 必须审核

  LEVEL4:
    name: 架构级缺陷
    desc: 分层错误、依赖冲突、模型关联断裂、数据丢失风险
    auto_fix: false
    forbid_execute: true

# ==============================================
# 修复标准流程（8步 + 预防复发）
# ==============================================
fix_workflow:
  step_1:
    name: 错误登记
    action: 创建/更新 bug_record.md
    required_field:
      - 错误现象（Odoo error traceback 全文）
      - 根因分析（哪次 sprint、什么操作导致的）
      - 影响范围（哪些功能不可用）
      - 根因分类（工具缺陷 / 历史遗留 / 第三方 / 设计错误 / 其他）
      - 状态: 🔴 待修复

  step_2:
    name: 风险定级
    action: 按 severity_level 判定等级
    rule: |
      LEVEL1: 自动修复，无需卡点
      LEVEL2: 简单复核后修复
      LEVEL3: 人工审核后修复
      LEVEL4: 禁止自动执行，需技术负责人审批

  step_3:
    name: 修复设计
    action: 描述修复方案
    output: "修复方案描述（几句话，不需要详细设计）"

  step_3_5:
    name: 同类根因排查（v2 新增）
    action: |
      当前 Bug 的根因分类后，检查是否还有其他文件存在同类问题：
      - 工具缺陷类 → 扫描所有 apply_patch 生成的文件
      - 历史遗留类 → 搜索所有代码文件中的旧名称/旧路径
      - 设计错误类 → 回顾相关 intent 契约
    rationale: |
      BUG-001/002/006 同为 apply_patch 前导空格问题，若 BUG-001 修复时
      就扫描全部文件，可提前发现 BUG-006（3个XML文件）。
      BUG-003 修复模块前缀时若全量扫描，可提前发现 BUG-005（12处残留）。

  step_4:
    name: 执行修复
    action: 修改代码
    post_check: |
      Python 语法验证: python3 -c "compile(open(f).read(), f, 'exec')"
      XML 格式验证:   python3 -c "from xml.etree import ElementTree; ElementTree.parse(f)"
      前导空格检查:   python3 -c "with open(f) as fh: l=fh.readline(); assert len(l)-len(l.strip())<=1"

  step_5:
    name: 回归验证
    action: odoo-bin -u wd_tlms 确认模块加载无报错
    note: "如无法启动 Odoo，至少验证 Python 语法 + XML 结构无误"

  step_6:
    name: 状态闭环
    action: |
      更新 bug_record.md:
      - 状态改为 ✅ 已修复
      - 记录修复 commit hash
      - 如涉及架构/业务认知变更 → 更新 decision_note.md

  step_7:
    name: 提交固化
    action: git_commit.sh

  step_8:
    name: 预防复发（v2 新增）
    action: |
      将本次 Bug 的检查规则追加到 pipeline_check.yaml 或 workflow_risk.yaml：
      - 如果是语法错误 → 追加到 check_1/check_2
      - 如果是命名不一致 → 追加到 check_4
      - 如果是版本问题 → 追加到 check_5
    rationale: |
      没有预防措施的 Bug 修复，同类问题会在不同文件上反复发生。
      BUG-001→BUG-006 的链条就是典型案例。
    effect: "治理资产持续进化，同类 Bug 不再复发"

# ==============================================
# Bug 记录文件规范
# ==============================================
record_format:
  location: "docs/context/history/bug_record.md"
  mandatory_sections:
    - "Bug ID（自增编号）"
    - "发现时间"
    - "发现场景"
    - "根因文件"
    - "错误类型"
    - "根因分类（工具缺陷/历史遗留/第三方/设计错误/其他）"
    - "错误现象（含 traceback）"
    - "根因分析"
    - "发生 Sprint"
    - "影响范围"
    - "修复方案（修复后填写）"
    - "预防措施（v2 新增）"
    - "状态（🔴 待修复 → 🟡 修复中 → ✅ 已修复）"

# ==============================================
# Bugs 闭环审计
# ==============================================
audit_rule:
  - 所有修复必须更新 bug_record.md
  - 不允许跳过步骤直接改代码
  - 修复后必须验证语法无误（check_1 + check_2）
  - LEVEL3+ 的修复必须留有人工审核记录
  - Step 8 预防复发必须执行，不可跳过
