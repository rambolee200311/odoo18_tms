# ==============================================
# 认知控制工程 · 强制加载规则
# 适配书稿：第六章 认知控制工程
# 生效范围：所有AI Codex迭代、代码生成、需求解析
# 优先级：高于业务需求、高于临时需求、仅次于意图契约
# ==============================================

cognition_version: 1.0.0
enable_cognition_control: true

# ========== AI 开发前置强制动作（必须100%执行） ==========
pre_dev_load_order:
  1: "读取 context_version.yaml 锁定当前项目基线版本"
  2: "读取 architecture/module_map.md 架构分层认知"
  3: "读取 architecture/dependency.yaml 模块依赖认知"
  4: "读取 business/ 全部业务规则认知"
  5: "读取 history/decision_note.md 历史架构决策认知"
  6: "读取 history/bug_record.md 历史缺陷规避认知"
  7: "读取 constraints/forbidden_change.yaml 刚性约束认知"
  8: "读取本次迭代意图契约，对齐任务边界"

# ========== 认知一致性铁律（禁止推翻存量设计） ==========
consistency_law:
  - 禁止推翻历史架构决策
  - 禁止绕过已定义业务铁律
  - 禁止破坏模块分层架构
  - 禁止违规修改禁止修改字段/模型
  - 禁止遗忘历史Bug规避方案
  - 禁止脱离项目基线随意开发

# ========== 认知缺失拦截规则 ==========
missing_cognition_intercept:
  - 架构认知缺失 → 禁止开发
  - 业务规则认知缺失 → 禁止开发
  - 历史决策冲突 → 禁止开发
  - 违规修改风险 → 禁止开发

# ========== 认知优先级排序 ==========
cognition_priority:
  1: 刚性约束 forbidden_change
  2: 历史决策 decision_note
  3: 架构分层 module_map
  4: 业务规则 business_rule
  5: 当前意图契约 task_intent
  6: 临时用户需求