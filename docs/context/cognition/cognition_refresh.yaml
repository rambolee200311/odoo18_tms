# ==============================================
# 认知刷新与迭代沉淀机制
# 属于：第六章 认知控制工程核心资产
# 作用：保证代码迭代 → 认知同步更新
# ==============================================

refresh_trigger:
  # 每一次git提交必须触发认知更新
  - 新功能开发完成
  - 业务规则新增/修改
  - 架构设计调整
  - 历史Bug修复
  - 新增开发决策
  - 模型/视图结构变更

# 每次迭代必须更新的认知资产清单
refresh_asset_list:
  - history/sprint_shturl
  - history/decision_note.md
  - history/bug_record.md
  - context_version.yaml

# 认知沉淀四要素（每次迭代必须产出）
precipitation_elements:
  1: "本次迭代新增业务认知"
  2: "本次迭代架构认知加固"
  3: "本次迭代规避的风险认知"
  4: "本次迭代新增决策认知"

# 禁止行为
forbidden:
  - 只改代码、不更新认知资产
  - 迭代升级、版本不升级
  - 新增规则、不沉淀决策