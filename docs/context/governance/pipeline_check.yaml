# ==============================================
# 流水线产出验证门禁（Post-Generation Quality Gate）
# 根因：BUG-001~006 均因生成代码未经验证直接提交
# 作用：每次代码生成后自动执行语法/结构/命名一致性校验
# 执行入口：execution/scripts/verify.py（将本文件中的规则转化为可执行检查）
# ==============================================

pipeline_version: 2.0.0
enable_post_generation_gate: true

# ==============================================
# 校验步骤（每次代码生成/修改后强制执行）
# ==============================================
check_steps:

  check_1_python_syntax:
    name: "Python 语法校验"
    scope: "所有 .py 文件"
    execute: "python3 -c \"compile(open(f).read(), f, 'exec')\""
    fail_on: "任何 SyntaxError"
    verify_py: true
    blocked_by: "BUG-001, BUG-002"

  check_2_xml_syntax:
    name: "XML 结构校验"
    scope: "所有 .xml 文件"
    execute: "xml.etree.ElementTree.parse(f)"
    fail_on: "任何 ParseError"
    verify_py: true
    blocked_by: "BUG-006"

  check_3_leading_space:
    name: "文件首字符空格检查"
    scope: "所有 .py, .xml 文件"
    method: "第一行 len(line) - len(line.strip()) > 1 → 有前导空格"
    fail_on: "首行存在前导空格"
    verify_py: true
    blocked_by: "BUG-001, BUG-002, BUG-006"

  check_4_module_name:
    name: "模块名一致性检查"
    scope: "addons/wd_tlms/ 下的 .py, .xml, .js, .csv 文件"
    method: "扫描 transport_logistics_management 旧模块名"
    fail_on: "任何引用旧模块名"
    verify_py: true
    blocked_by: "BUG-003, BUG-005"

  check_5_odoo18_compat:
    name: "Odoo 18 版本兼容检查"
    scope: "addons/wd_tlms/views/ 下的 .xml 文件"
    patterns:
      - pattern: "<tree"
        message: "Odoo 18 已移除 <tree>，应使用 <list>"
      - pattern: "decoration-bf"
        message: "应使用 decoration-bold"
      - pattern: "decoration-it"
        message: "应使用 decoration-italic"
      - pattern: 'widget="state_selection"'
        message: "应使用 widget='badge'"
      - pattern: "colors="
        message: "Odoo 18 已移除 colors 属性"
    fail_on: "任何上述旧模式"
    verify_py: true
    blocked_by: "Odoo 18 migration"

  check_6_tab_chars:
    name: "Tab 字符校验"
    scope: "所有 .py, .xml 文件（JS 允许 tab，除外）"
    method: "逐行扫描 \\t 字符"
    fail_on: "任何 Tab 字符"
    verify_py: true
    blocked_by: "BUG-007 (TabError)"


  check_8_menuitem_order:
    name: "Menuitem 父菜单顺序校验"
    scope: "addons/wd_tlms/views/ 下的 .xml 文件"
    method: "扫描 <menuitem parent=...>，验证父菜单 ID 在当前文件前部定义"
    fail_on: "父菜单后置引用或未定义"
    verify_py: true
    blocked_by: "BUG-011"

  check_7_view_model:
    name: "View-Model 字段存在性交叉校验"
    scope: "视图 XML → 对应模型 Python"
    script: "execution/scripts/verify.py (check_7)"
    note: "v3 精确模式，误报率 63→0。真实错误会阻塞提交"
    blocked_by: "BUG-007 (schedule_ids)"


  check_9_runtime_test:
    name: "运行时集成测试"
    scope: "addons/wd_tlms/tests/test_runtime_validation.py"
    method: |
      odoo-bin -u wd_tlms --test-enable --stop-after-init
      验证：
        1. act_window view_mode 不含 "tree"（Odoo 18 兼容）
        2. 菜单 parent 指向存在视图
        3. act_window res_model 有对应类型视图
        4. view_ids 引用的视图真实存在
    fail_on: "任何测试失败"
    blocked_by: "BUG-012 (view_mode=tree)"

# ==============================================
# 执行时机
# ==============================================

execution_timing:
  - after_every_code_generation: true
  - before_git_commit: true
  - on_create_pull_request: true

# ==============================================
# 熔断策略
# ==============================================
fuse:
  - "check_1 ~ check_6 任一失败 → 拒绝提交"
  - "check_7 真实错误 → 拒绝提交；check_8 失败 → 拒绝提交"
  - "修复后重新运行 verify.py，通过后方可提交"
  - "跳过校验需人工审批（LEVEL2/3 风险），并在 bug_record.md 记录"

# ==============================================
# 与现有治理文件的关系
# ==============================================
integration:
  - "execution/scripts/verify.py → 本文件的 check_steps 可执行实现"
  - "workflow_risk.yaml → pipeline_check_step 引用本文件"
  - "tool_governance.yaml → tool_pre_check 引用本文件"
  - "bug_fix_workflow.yaml → Step 8 预防复发引用本文件"
