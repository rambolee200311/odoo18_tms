    - "bug_fix_workflow.yaml step_5 post_check 新增集成测试要求"

    # ---- 版本管理 ----
    - "context_version.yaml: 1.0.11 → 1.0.12"

  forbid:
    - 禁止修改任何业务模型（transport.request/pickup.plan/order/inquiry/quote/fee）
    - 禁止修改任何业务视图（transport_request_views/pickup_plan_views/order_views 等）
    - 禁止修改任何菜单、权限、序列、数据文件
    - 禁止修改 __manifest__.py（tests 目录自动发现，无需声明）
    - 禁止修改 execution/scripts/verify.py（check_7/check_8 已在 Sprint12 迭代中上线）
    - 禁止开发财务、结算、费率、账单任何字段或逻辑
    - 禁止修改 Odoo 底层 ORM、原生模块

